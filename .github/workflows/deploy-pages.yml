name: Deploy static site to GitHub Pages

# Trigger on pushes to main (adjust branch if your default branch is different)
on:
  push:
    branches:
      - main

# Force JavaScript actions to run on Node 24 now (opt-in)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy GitHub Pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # If you have a build step (npm, gulp, hugo, etc.) add it here.
      # For this static site the repository root already contains the site files.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          # Path to the directory that should be published. Use '.' to publish repo root.
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1

      - name: Deployment status
        run: |
          echo "Deployment finished. Check the Pages tab in repository settings or the Actions run for details."
